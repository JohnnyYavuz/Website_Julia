<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GONG FREQUENCIES — Julia Martyn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=IBM+Plex+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    /* Terracotta (default) */
    --bg:        #1a120d;
    --bg-2:      #231812;
    --paper:     #efe4d2;
    --ink:       #efe4d2;
    --ink-soft:  #c9b9a2;
    --ink-dim:   #8a7a64;
    --accent:    #c2613a;   /* terracotta */
    --accent-2:  #e0a054;   /* ocker */
    --rule:      rgba(239,228,210,0.14);
    --grain:     0.06;
  }
  [data-palette="ocker"] {
    --bg: #1c160c; --bg-2: #26200f;
    --paper: #f2e7ce; --ink: #f2e7ce;
    --ink-soft:#d5c295; --ink-dim:#8f7f56;
    --accent:#d29244; --accent-2:#a85a2c;
    --rule: rgba(242,231,206,0.14);
  }
  [data-palette="espresso"] {
    --bg: #120c0a; --bg-2: #1a120f;
    --paper: #e9ddc8; --ink: #e9ddc8;
    --ink-soft:#b8a78d; --ink-dim:#796857;
    --accent:#8a3a1f; --accent-2:#c28248;
    --rule: rgba(233,221,200,0.12);
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-weight: 300;
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection{background:var(--accent);color:var(--bg)}
  a{color:inherit}

  /* paper grain overlay */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.93 0 0 0 0 0.89 0 0 0 0 0.82 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
    opacity: var(--grain);
    mix-blend-mode: overlay;
  }

  .serif{font-family:"Newsreader", "Cormorant Garamond", Georgia, serif; font-weight:300; letter-spacing:-0.01em;}
  .mono{font-family:"JetBrains Mono", ui-monospace, monospace; font-weight:300; letter-spacing:0.04em;}

  /* === NAV === */
  nav.top{
    position: fixed; top:0; left:0; right:0; z-index: 50;
    display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;
    padding: 18px 36px;
    background: rgba(18, 12, 10, 0.42);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    backdrop-filter: blur(18px) saturate(140%);
    border-bottom: 1px solid rgba(239,228,210,0.08);
    color: #efe4d2;
    transition: background .4s ease, border-color .4s ease;
  }
  nav.top.scrolled{
    background: rgba(58, 38, 28, 0.92);
    border-bottom-color: rgba(239,228,210,0.22);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
  }
  }
  nav.top .brand{
    font-family:"Newsreader", serif; font-style: italic; font-weight:300;
    font-size: 20px; letter-spacing: 0.02em;
  }
  nav.top .brand b{font-style:normal; font-weight:400;}
  nav.top ul{list-style:none; margin:0; padding:0; display:flex; gap:32px; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; justify-self:center;}
  nav.top ul a{
    position: relative;
    text-decoration:none;
    color: rgba(239,228,210,0.78);
    padding: 6px 0;
    transition: color .3s ease;
  }
  nav.top ul a::after{
    content:""; position:absolute; left:0; bottom: 0;
    width: 100%; height: 1px;
    background: var(--accent-2, #e0a054);
    transform: scaleX(0); transform-origin: right center;
    transition: transform .5s cubic-bezier(.22,.68,.22,1);
  }
  nav.top ul a:hover{color: #efe4d2;}
  nav.top ul a:hover::after{transform: scaleX(1); transform-origin: left center;}
  nav.top .cta{
    border:1px solid rgba(239,228,210,0.35);
    padding: 10px 18px; border-radius: 999px;
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    text-decoration:none; color: #efe4d2;
    transition: background .3s ease, border-color .3s ease, color .3s ease;
  }
  nav.top .cta:hover{
    background: var(--accent-2, #e0a054);
    border-color: var(--accent-2, #e0a054);
    color: #120c0a;
  }

  /* === HERO === */
  section.hero{
    position: relative;
    height: auto; min-height: 0;
    padding: 140px 24px 120px;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    overflow: hidden;
  }
  canvas#gong-canvas{
    position: absolute; inset: 0; width:100%; height:100%;
    z-index: 0;
  }
  .hero-inner{
    position: relative; z-index: 2;
    text-align:center;
    padding: 0 24px;
    max-width: 1100px;
  }
  .kicker{
    font-family:"JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft);
    display: inline-flex; gap: 14px; align-items:center;
  }
  .kicker::before, .kicker::after{
    content:""; display:block; width: 32px; height:1px; background: currentColor; opacity:.4;
  }
  h1.hero-title{
    font-family:"Newsreader", serif;
    font-weight: 300;
    font-size: clamp(48px, 9vw, 140px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 28px 0 24px;
    color: var(--paper);
  }
  h1.hero-title em{
    font-style: italic; font-weight: 300;
    color: var(--accent-2);
  }
  .hero-sub{
    max-width: 540px; margin: 0 auto;
    font-size: 16px; color: var(--ink-soft);
  }
  .hero-meta{
    position: absolute; bottom: 24px; left: 36px; right: 36px;
    display:flex; justify-content:space-between; align-items:flex-end;
    font-family:"JetBrains Mono", monospace; font-size:11px;
    letter-spacing:0.2em; text-transform:uppercase; color: var(--ink-dim);
    z-index: 2;
  }
  .hero-meta .scroll{display:flex; align-items:center; gap:12px;}
  .hero-meta .scroll .line{
    width: 40px; height:1px; background: var(--ink-dim);
    position: relative; overflow:hidden;
  }
  .hero-meta .scroll .line::after{
    content:""; position:absolute; inset:0;
    background: var(--accent-2);
    animation: sweep 3s infinite ease-in-out;
  }
  @keyframes sweep{
    0%{transform:translateX(-100%)} 100%{transform:translateX(100%)}
  }

  /* === Section generic === */
  section{position:relative; padding: 140px 36px;}
  .container{max-width: 1200px; margin: 0 auto;}
  .two-col{display:grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items:start;}
  @media (max-width: 820px){
    .two-col{grid-template-columns: 1fr; gap: 40px;}
    section{padding: 90px 24px;}
    nav.top{padding: 18px 20px;}
    nav.top ul{
      display:none;
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      background: rgba(18, 12, 10, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-direction: column;
      padding: 24px;
      gap: 0;
      border-bottom: 1px solid var(--rule);
    }
    nav.top ul.open{display: flex;}
    nav.top ul li{
      border-bottom: 1px solid var(--rule);
    }
    nav.top ul li:last-child{border-bottom: none;}
    nav.top ul a{
      display: block;
      padding: 16px 0;
      font-size: 13px;
    }
    .menu-toggle{
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      justify-self: end;
    }
    .menu-toggle span{
      width: 24px;
      height: 2px;
      background: var(--paper);
      transition: transform .3s, opacity .3s;
    }
    .menu-toggle.open span:nth-child(1){transform: rotate(45deg) translate(5px, 5px);}
    .menu-toggle.open span:nth-child(2){opacity: 0;}
    .menu-toggle.open span:nth-child(3){transform: rotate(-45deg) translate(5px, -5px);}
    .hero-meta{left:20px; right:20px;}
    /* Hero mobile styles */
    .hero-title{
      font-size: clamp(32px, 7vw, 48px) !important;
      line-height: 1.1 !important;
      letter-spacing: -0.02em !important;
    }
    .hero-sub b{font-size: clamp(20px, 4.5vw, 28px) !important;}
    /* Smaller CTA buttons on mobile */
    .hero-cta-row .btn{
      padding: 12px 20px !important;
      font-size: 10px !important;
    }
    .hero-cta-row{gap: 12px;}
  }
  .menu-toggle{display: none;}

  .eyebrow{
    font-family:"JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--accent-2);
    margin-bottom: 24px;
    display:flex; align-items:center; gap: 14px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

  h2.display{
    font-family:"Newsreader", serif; font-weight:300;
    font-size: clamp(36px, 5.5vw, 72px);
    line-height: 1.02; letter-spacing: -0.02em;
    margin: 0 0 24px;
    color: var(--paper);
  }
  h2.display em{font-style:italic; color:var(--accent-2);}
  .lede{font-size: 19px; line-height: 1.55; color: var(--ink-soft); max-width: 44ch;}
  .lede.serif{font-family:"Newsreader", serif; font-size: 24px; line-height:1.4;}

  hr.rule{border:0; border-top:1px solid var(--rule); margin: 0;}

  /* === Pillars (3) === */
  .pillars{display:grid; grid-template-columns: repeat(3,1fr); gap: 0;
    border-top: 1px solid var(--rule);
  }
  .pillar{padding: 56px 32px; border-right: 1px solid var(--rule);}
  .pillar:last-child{border-right:none;}
  .pillar .num{
    font-family:"JetBrains Mono", monospace; font-size: 11px; color: var(--ink-dim);
    letter-spacing: 0.2em;
  }
  .pillar h3{
    font-family:"Newsreader", serif; font-weight:300;
    font-size: 28px; letter-spacing: -0.01em; margin: 16px 0 16px;
    color: var(--paper);
  }
  .pillar p{color: var(--ink-soft); font-size: 15.5px; margin: 0;}
  @media (max-width: 820px){
    .pillars{grid-template-columns:1fr;}
    .pillar{border-right:none; border-bottom: 1px solid var(--rule);}
  }

  /* === Pillars triptych (Körper / Geist / Seele) === */
  .pillars-section{padding-top: 0;}
  .pillars-head{margin-bottom: 80px;}
  .pillars-triptych{
    list-style: none; margin: 0; padding: 0;
    display: flex; flex-direction: column;
    border-top: 1px solid var(--rule);
  }
  .pillar-row{
    display: grid;
    grid-template-columns: 140px 1fr 2fr;
    gap: 48px;
    align-items: baseline;
    padding: 56px 0;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .pillar-roman{
    font-family: "Newsreader", serif;
    font-style: italic; font-weight: 300;
    font-size: clamp(56px, 6vw, 88px);
    color: var(--accent-2);
    line-height: 1;
    opacity: 0.85;
  }
  .pillar-title{
    font-family: "Newsreader", serif;
    font-weight: 300;
    font-size: clamp(32px, 3.2vw, 44px);
    letter-spacing: -0.01em;
    color: var(--paper);
    margin: 0;
  }
  .pillar-desc{
    font-family: "Newsreader", serif;
    font-weight: 300;
    font-size: 19px; line-height: 1.6;
    color: var(--ink-soft);
    max-width: 52ch;
    margin: 0;
  }
  @media (max-width: 820px){
    .pillar-row{
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 40px 0;
    }
  }

  /* === Intro layout with image === */
  .intro-layout{
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 64px;
    align-items: start;
  }
  .intro-content{
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .intro-image{
    position: sticky;
    top: 120px;
    border: 1px solid var(--rule);
    overflow: hidden;
  }
  .intro-image img{
    width: 100%;
    height: auto;
    display: block;
    filter: grayscale(20%) contrast(1.05);
    transition: filter .6s ease;
  }
  .intro-image:hover img{
    filter: grayscale(0%) contrast(1);
  }
  @media(max-width:960px){
    .intro-layout{grid-template-columns: 1fr; gap: 48px;}
    .intro-image{position: relative; top: 0;}
  }

  /* === Gong facts row (Intro) === */
  .gong-facts{
    margin-top: 96px;
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .gong-fact{
    padding: 48px 36px;
    border-right: 1px solid var(--rule);
  }
  .gong-fact:last-child{border-right:none;}
  .gong-fact-num{
    font-family: "Newsreader", serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(44px, 5vw, 72px);
    color: var(--accent-2);
    line-height: 1; margin-bottom: 12px;
  }
  .gong-fact-label{
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-dim); margin-bottom: 20px;
  }
  .gong-fact-text{
    color: var(--ink-soft);
    font-size: 15.5px; line-height: 1.65;
    max-width: 34ch;
  }
  @media (max-width: 820px){
    .gong-facts{grid-template-columns:1fr; margin-top: 64px;}
    .gong-fact{border-right:none; border-bottom: 1px solid var(--rule); padding: 36px 20px;}
    .gong-fact:last-child{border-bottom:none;}
  }

  /* === Offerings === */
  .offerings{display:grid; grid-template-columns: 1fr 1fr; gap: 24px;}
  .offer-card{
    position: relative;
    padding: 48px 40px 40px;
    background: var(--bg-2);
    border: 1px solid var(--rule);
    overflow: hidden;
    transition: transform .6s cubic-bezier(.2,.7,.2,1), border-color .3s;
  }
  .offer-card:hover{border-color: var(--accent);}
  .offer-card .tag{
    font-family:"JetBrains Mono", monospace; font-size: 10px;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--accent-2);
  }
  .offer-card h3{
    font-family:"Newsreader", serif; font-weight:300;
    font-size: 38px; line-height:1.05; letter-spacing:-0.01em;
    margin: 20px 0 16px; color: var(--paper);
  }
  .offer-card p{color: var(--ink-soft); margin: 0 0 28px; font-size:15.5px;}
  .offer-card ul{
    list-style:none; padding:0; margin: 0 0 28px;
    font-size: 14px; color: var(--ink-soft);
  }
  .offer-card ul li{
    padding: 10px 0; border-top: 1px solid var(--rule);
    display:flex; justify-content:space-between; gap: 12px;
  }
  .offer-card ul li:last-child{border-bottom: 1px solid var(--rule);}
  .offer-card ul li span:last-child{color: var(--ink-dim); font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.1em;}
  .offer-card .decor{
    position: absolute; top: -60px; right: -60px;
    width: 240px; height: 240px; border-radius:50%;
    border: 1px solid var(--rule);
  }
  .offer-card .decor::before{
    content:""; position:absolute; inset: 30px; border-radius:50%;
    border: 1px solid var(--rule);
  }
  @media (max-width: 820px){ .offerings{grid-template-columns:1fr;} }

  /* === Events === */
  .events-filter{
    display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px;
    font-family:"JetBrains Mono", monospace; font-size: 11px;
    letter-spacing:0.2em; text-transform:uppercase;
  }
  .events-filter button{
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--rule);
    padding: 10px 18px; border-radius: 999px;
    cursor: pointer; transition: all .2s;
    font: inherit;
  }
  .events-filter button:hover{color:var(--paper); border-color: var(--ink-soft);}
  .events-filter button[data-active="true"]{
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .event-row{
    display:grid; grid-template-columns: 72px 100px 1.2fr 1fr auto; gap: 24px; align-items:center;
    padding: 28px 0;
    border-top: 1px solid var(--rule);
    transition: background .3s;
    cursor: pointer;
    position: relative;
  }
  .event-row:last-child{border-bottom: 1px solid var(--rule);}
  .event-row:hover{background: var(--bg-2);}
  .event-row .date{
    font-family:"Newsreader", serif;
    font-size: 36px; line-height:1; color: var(--paper);
    letter-spacing: -0.02em;
  }
  .event-row .date .mo{
    display:block; font-family:"JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.3em; color: var(--ink-dim);
    margin-top: 8px;
  }
  .event-row .title h4{
    font-family:"Newsreader", serif; font-weight:400;
    font-size: 24px; margin: 0 0 6px; color: var(--paper);
  }
  .event-row .title span{font-size: 14px; color: var(--ink-dim);}
  .event-row .loc{font-size: 14px; color: var(--ink-soft);}
  .event-row .loc small{display:block; color: var(--ink-dim); font-family:"JetBrains Mono", monospace; font-size: 10px; letter-spacing:.2em; margin-bottom:4px;}
  .event-row .arrow{
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid var(--rule);
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-soft); transition: all .3s;
  }
  .event-row:hover .arrow{background: var(--accent); color: #fff; border-color: var(--accent);}
  @media (max-width: 820px){
    .event-row{grid-template-columns: 56px 70px 1fr; gap: 16px;}
    .event-row .loc, .event-row .arrow{display:none;}
    .event-row .date{font-size:28px;}
    .event-row .event-thumb{width: 56px; height: 56px;}
  }

  /* === Sound Player === */
  .player{
    background: var(--bg-2);
    border: 1px solid var(--rule);
    padding: 56px;
    display:grid; grid-template-columns: 1fr 1fr; gap: 56px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .player canvas.viz{
    width: 100%; height: 280px;
    display: block;
  }
  .player .controls{display:flex; align-items:center; gap: 24px; margin-top: 28px;}
  .player .play{
    width: 72px; height:72px; border-radius:50%;
    border: 1px solid var(--accent); background: transparent;
    color: var(--accent); cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all .3s;
  }
  .player .play:hover{background: var(--accent); color:#fff;}
  .player .play.playing{background: var(--accent); color:#fff;}
  .player .meta{font-family:"JetBrains Mono", monospace; font-size:11px; letter-spacing:.2em; color:var(--ink-dim); text-transform: uppercase;}
  .player .meta b{color: var(--ink-soft); font-weight: 400;}
  .player .consent{
    margin-top: 16px;
    font-size: 12px; color: var(--ink-dim);
    max-width: 360px; line-height: 1.5;
  }
  @media (max-width: 820px){ .player{grid-template-columns:1fr; padding: 32px;} }

  /* === Testimonials === */
  .testimonial-track{
    display:flex; gap: 24px; overflow-x:auto;
    scroll-snap-type: x mandatory;
    padding-bottom: 12px; margin: 0 -36px; padding-left: 36px; padding-right:36px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  .testimonial-track::-webkit-scrollbar{height:4px;}
  .testimonial-track::-webkit-scrollbar-thumb{background: var(--accent); border-radius:4px;}
  .tcard{
    flex: 0 0 clamp(300px, 42vw, 520px);
    background: var(--bg-2);
    border: 1px solid var(--rule);
    padding: 40px;
    scroll-snap-align: start;
  }
  .tcard .q{
    font-family:"Newsreader", serif; font-weight:300; font-style: italic;
    font-size: 22px; line-height: 1.4; color: var(--paper);
    margin: 0 0 28px;
  }
  .tcard .q::before{content:"„"; color: var(--accent-2); font-size: 48px; line-height:0; vertical-align:-18px; margin-right:4px;}
  .tcard .who{
    font-family:"JetBrains Mono", monospace; font-size:11px;
    letter-spacing:0.2em; text-transform:uppercase; color: var(--ink-dim);
    display:flex; justify-content:space-between;
  }
  .tcard .who b{color: var(--ink-soft); font-weight: 400;}

  /* === Contact === */
  .contact-form{display:grid; gap: 20px; max-width: 560px;}
  .contact-form label{
    font-family:"JetBrains Mono", monospace; font-size:10px;
    letter-spacing:0.24em; text-transform: uppercase; color: var(--ink-dim);
    display:block; margin-bottom: 8px;
  }
  .contact-form input, .contact-form textarea{
    width:100%; background: transparent; color: var(--paper);
    border:none; border-bottom: 1px solid var(--rule);
    padding: 10px 0; font: inherit; font-size: 17px;
    transition: border-color .3s;
  }
  .contact-form input:focus, .contact-form textarea:focus{
    outline:none; border-bottom-color: var(--accent);
  }
  .contact-form textarea{resize:vertical; min-height: 120px;}
  .btn{
    display:inline-flex; align-items:center; gap: 14px;
    padding: 16px 28px; background: var(--accent); color: #fff;
    border: none; cursor: pointer;
    font-family:"JetBrains Mono", monospace; font-size:11px;
    letter-spacing:0.24em; text-transform: uppercase;
    border-radius: 999px; transition: all .3s;
    text-decoration:none;
  }
  .btn:hover{background: var(--accent-2);}
  .btn.ghost{background: transparent; border: 1px solid var(--ink-soft); color: var(--paper);}
  .btn.ghost:hover{border-color: var(--accent); color: var(--accent);}

  /* === Footer === */
  footer{
    padding: 60px 36px 40px;
    border-top: 1px solid var(--rule);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap: 20px;
    font-family:"JetBrains Mono", monospace; font-size: 11px;
    letter-spacing:0.2em; text-transform:uppercase; color: var(--ink-dim);
  }
  footer a{text-decoration:none; color: var(--ink-soft);}

  /* === Quiet mode === */
  [data-quiet="true"] canvas#gong-canvas{opacity: 0.4; filter: blur(1px);}
  [data-quiet="true"] *{animation-duration: 0.01ms !important; transition-duration: 0.2s !important;}
  [data-quiet="true"] .hero-meta .scroll .line::after{display:none;}

  /* === Tweaks panel === */
  .tweaks-panel{
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: #0c0805; border:1px solid var(--accent);
    padding: 20px; width: 280px; color: var(--paper);
    font-family:"JetBrains Mono", monospace; font-size:11px;
    letter-spacing:0.1em; display:none;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  }
  .tweaks-panel[data-open="true"]{display:block;}
  .tweaks-panel h5{
    margin: 0 0 16px; font-size: 11px; letter-spacing: 0.3em;
    text-transform:uppercase; color: var(--accent-2);
  }
  .tweaks-panel .row{margin-bottom: 18px;}
  .tweaks-panel .row label{display:block; margin-bottom:8px; color: var(--ink-dim);}
  .tweaks-panel .swatches{display:flex; gap: 8px;}
  .tweaks-panel .swatch{
    flex:1; height: 42px; border:1px solid var(--rule); cursor:pointer;
    display:flex; align-items:end; justify-content:center; padding-bottom: 4px;
    font-size: 9px; text-transform:uppercase; letter-spacing:.2em;
    color: var(--paper);
  }
  .tweaks-panel .swatch[data-active="true"]{border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent);}
  .tweaks-panel .toggle{
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
  }
  .tweaks-panel .toggle .pill{
    width: 36px; height: 20px; background: var(--rule); border-radius: 999px; position:relative;
    transition: background .3s;
  }
  .tweaks-panel .toggle .pill::after{
    content:""; position:absolute; top: 2px; left: 2px;
    width: 16px; height:16px; border-radius:50%; background: var(--paper);
    transition: left .3s;
  }
  .tweaks-panel .toggle[data-on="true"] .pill{background: var(--accent);}
  .tweaks-panel .toggle[data-on="true"] .pill::after{left: 18px;}

  html{scroll-behavior: smooth;}

  /* intersection fade — buttery, larger shift + tiny scale */
  .reveal{
    opacity:0;
    transform: translateY(72px) scale(0.98);
    transition:
      opacity 1.8s cubic-bezier(.16,.84,.24,1),
      transform 1.8s cubic-bezier(.16,.84,.24,1);
    will-change: opacity, transform;
  }
  .reveal.in{opacity:1; transform: translateY(0) scale(1);}
  .reveal[data-delay="1"]{transition-delay:.18s}
  .reveal[data-delay="2"]{transition-delay:.36s}
  .reveal[data-delay="3"]{transition-delay:.54s}
  .reveal[data-delay="4"]{transition-delay:.72s}
  .reveal[data-delay="5"]{transition-delay:.90s}
  .reveal[data-delay="6"]{transition-delay:1.08s}

  @media (prefers-reduced-motion: reduce){
    .reveal, .reveal.in{opacity:1 !important; transform:none !important; transition:none !important;}
    html{scroll-behavior: auto;}
  }

  /* Horizontal reveal — slides in from the left */
  .reveal-x{
    opacity: 0;
    transform: translateX(-64px);
    transition:
      opacity 1.4s cubic-bezier(.16,.84,.24,1),
      transform 1.4s cubic-bezier(.16,.84,.24,1);
    will-change: opacity, transform;
  }
  .reveal-x.in{opacity: 1; transform: translateX(0);}
  .reveal-x[data-delay="1"]{transition-delay: .0s}
  .reveal-x[data-delay="2"]{transition-delay: .35s}
  .reveal-x[data-delay="3"]{transition-delay: .70s}
  .reveal-x[data-delay="4"]{transition-delay: 1.05s}
  @media (prefers-reduced-motion: reduce){
    .reveal-x, .reveal-x.in{opacity:1 !important; transform:none !important; transition:none !important;}
  }

  /* ======= UX UPGRADES ======= */

  /* Scroll progress bar (top) */
  .scroll-progress{
    position: fixed; top:0; left:0; height: 2px;
    background: var(--accent-2);
    z-index: 90; width: 0%;
    transition: width .15s linear;
    box-shadow: 0 0 12px var(--accent-2);
  }

  /* Custom resonance cursor (desktop only) */
  @media (hover: hover) and (pointer: fine){
    body.has-cursor { cursor: none; }
    body.has-cursor a, body.has-cursor button, body.has-cursor input, body.has-cursor textarea, body.has-cursor [data-cursor]{ cursor:none; }
    .cursor-ring{
      position: fixed; top:0; left:0; pointer-events:none; z-index: 9999;
      width: 36px; height:36px; border-radius:50%;
      border: 1px solid var(--accent-2);
      transform: translate(-50%,-50%);
      transition: width .25s ease, height .25s ease, border-color .25s ease, background .25s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring.big{ width: 88px; height:88px; background: rgba(224,160,84,0.08); border-color: var(--accent);}
    .cursor-ring.text{ width: 6px; height:26px; border-radius:2px; background: var(--accent-2);}
    .cursor-dot{
      position: fixed; top:0; left:0; pointer-events:none; z-index: 9999;
      width: 4px; height:4px; border-radius:50%;
      background: var(--paper);
      transform: translate(-50%,-50%);
      mix-blend-mode: difference;
    }
  }

  /* Typewriter cursor */
  .tw-cursor{
    display:inline-block; width: 3px; background: var(--accent-2);
    margin-left: 4px; height: 0.85em; vertical-align: -0.05em;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes wordUp{
    0%{opacity:0; transform: translateY(110%);}
    60%{opacity:1;}
    100%{opacity:1; transform: translateY(0);}
  }
  .tw-char{visibility:hidden;}

  /* CTA pulse aura */
  .btn.pulse{animation: ctaPulse 3.2s ease infinite;}
  @keyframes ctaPulse{
    0%,100%{box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 0 0 var(--accent);}
    55%{box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 0 14px rgba(0,0,0,0);}
  }
  /* Shimmer sweep */
  .btn.pulse{position: relative; overflow: hidden;}
  .btn.pulse::after{
    content:""; position:absolute; top:0; bottom:0; left:-80%; width:50%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
    transform: skewX(-18deg);
    animation: btnShimmer 4s ease infinite 1.2s;
    pointer-events:none;
  }
  @keyframes btnShimmer{
    0%{left:-80%; opacity:1}
    40%{left:130%; opacity:1}
    41%{opacity:0}
    100%{left:130%; opacity:0}
  }

  /* Magnetic buttons — inline transform via JS; base transition */
  .magnet{transition: transform .25s cubic-bezier(.34,1.56,.64,1);}

  /* Stats row */
  .stats{
    display:grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-top: 60px;
  }
  .stat{
    padding: 40px 24px; border-right: 1px solid var(--rule);
  }
  .stat:last-child{border-right:none;}
  .stat .num{
    font-family:"Newsreader", serif; font-weight:300;
    font-size: clamp(40px, 5vw, 64px); color: var(--paper);
    line-height:1; letter-spacing:-0.02em;
  }
  .stat .num em{font-style:italic; color: var(--accent-2);}
  .stat .label{
    font-family:"JetBrains Mono", monospace; font-size:10px;
    letter-spacing:0.24em; text-transform:uppercase; color: var(--ink-dim);
    margin-top: 14px;
  }
  @media (max-width: 820px){ .stats{grid-template-columns: repeat(2,1fr);} .stat:nth-child(2){border-right:none;} .stat:nth-child(1), .stat:nth-child(2){border-bottom:1px solid var(--rule);} }

  /* Before/After slider — "vor Gong / nach Gong" feeling state slider */
  .ba-wrap{
    position:relative; aspect-ratio: 16/10;
    border: 1px solid var(--rule); background: var(--bg-2);
    overflow:hidden; user-select:none; touch-action:none;
  }
  .ba-layer{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:40px;}
  .ba-label{
    position:absolute; top: 20px; left: 20px;
    font-family:"JetBrains Mono", monospace; font-size:10px;
    letter-spacing:0.28em; text-transform:uppercase; color: var(--paper);
    background: rgba(0,0,0,0.45); padding: 6px 14px; border-radius: 999px;
    backdrop-filter: blur(6px);
  }
  .ba-layer.after .ba-label{left: auto; right: 20px; background: rgba(194,97,58,0.6);}
  .ba-canvas{position:absolute; inset:0;}
  .ba-after{clip-path: inset(0 0 0 50%);}
  .ba-handle{
    position:absolute; top:0; bottom:0; left: 50%;
    width: 2px; background: var(--paper);
    transform: translateX(-50%);
    cursor: ew-resize;
  }
  .ba-handle::before{
    content:""; position:absolute; top: 50%; left:50%;
    transform: translate(-50%,-50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--paper);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .ba-handle::after{
    content:"⇆"; position:absolute; top: 50%; left:50%;
    transform: translate(-50%,-50%);
    font-size: 20px; color: var(--bg);
    font-weight: 700;
  }

  /* Frequency tuner — interactive scroll-driven knob */
  .tuner{
    position:relative; aspect-ratio: 1;
    max-width: 480px; margin: 0 auto;
  }
  .tuner canvas{width:100%; height:100%; display:block;}
  .tuner .readout{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none; text-align:center;
  }
  .tuner .hz{
    font-family:"Newsreader", serif; font-weight:300;
    font-size: clamp(48px, 6vw, 80px); color: var(--paper);
    letter-spacing:-0.02em;
  }
  .tuner .hz em{color: var(--accent-2); font-style: italic;}
  .tuner .name{
    font-family:"JetBrains Mono", monospace; font-size:11px;
    letter-spacing:0.24em; text-transform:uppercase; color: var(--ink-dim);
    margin-top: 12px; max-width: 240px;
  }

  /* Marquee ticker */
  .marquee{
    overflow: hidden; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule);
    padding: 32px 0;
  }
  .marquee-track{
    display:flex; gap: 64px; white-space:nowrap;
    animation: marquee 40s linear infinite;
    font-family:"Newsreader", serif; font-style: italic; font-weight: 300;
    font-size: clamp(32px, 4vw, 56px); color: var(--ink-soft);
  }
  .marquee-track span{display:inline-flex; align-items:center; gap: 64px;}
  .marquee-track .dot{width: 8px; height:8px; border-radius:50%; background: var(--accent);}
  [data-quiet="true"] .marquee-track{animation-duration: 120s;}
  @keyframes marquee{to{transform: translateX(-50%);}}

  /* Hover lift on cards (magnetic feel) */
  .offer-card{will-change: transform;}
  .offer-card:hover{transform: translateY(-6px);}

  /* Event row sweep */
  .event-row{position: relative; overflow:hidden;}
  .event-row::before{
    content:""; position:absolute; left:-100%; top:0; bottom:0; width: 100%;
    background: linear-gradient(90deg, transparent, rgba(194,97,58,0.08), transparent);
    transition: left .9s cubic-bezier(.2,.7,.2,1);
    pointer-events:none;
  }
  .event-row:hover::before{left:100%;}

  /* Ripple on click */
  .ripple{position:absolute; border-radius:50%; background: rgba(239,228,210,0.15); transform: scale(0); animation: rippleAnim .7s ease-out forwards; pointer-events:none;}
  @keyframes rippleAnim{to{transform: scale(3); opacity:0;}}

  /* Side rail: section label */
  .side-rail{
    position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
    z-index: 40; display:flex; flex-direction:column; gap: 14px; align-items:flex-end;
    font-family:"JetBrains Mono", monospace; font-size:10px;
    letter-spacing:0.24em; text-transform:uppercase; color: var(--ink-dim);
  }
  .side-rail a{
    display:flex; align-items:center; gap: 10px; text-decoration:none;
    color: var(--ink-dim); transition: color .3s;
  }
  .side-rail a::after{
    content:""; width: 18px; height:1px; background: currentColor;
    transition: width .3s, background .3s;
  }
  .side-rail a.active{color: var(--paper);}
  .side-rail a.active::after{width: 38px; background: var(--accent-2);}
  .side-rail a:hover{color: var(--paper);}
  @media (max-width: 1100px){.side-rail{display:none;}}

  /* Floating booking handle */
  .floater{
    position: fixed; bottom: 24px; right: 24px; z-index: 150;
    display:flex; align-items:center; gap: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 999px;
    padding: 14px 24px;
    font-family:"JetBrains Mono", monospace; font-size:11px;
    letter-spacing:0.24em; text-transform:uppercase;
    cursor: pointer; text-decoration:none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: floaterPulse 3.5s ease infinite;
  }
  .floater:hover{background: var(--accent-2);}
  @keyframes floaterPulse{
    0%,100%{box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 0 var(--accent);}
    55%{box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 16px rgba(0,0,0,0);}
  }
  .floater .glyph{font-size:14px;}

  /* Lightbox for gallery */
  .gallery{display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 60px;}
  .gallery .tile{
    aspect-ratio: 1; cursor: zoom-in;
    border: 1px solid var(--rule);
    overflow: hidden;
    position: relative;
    transition: transform .5s cubic-bezier(.2,.7,.2,1), border-color .3s;
  }
  .gallery .tile img{
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .gallery .tile:hover{border-color: var(--accent);}
  .gallery .tile:hover img{transform: scale(1.08);}
  .gallery .tile:nth-child(1){grid-column: span 2; grid-row: span 2; aspect-ratio: auto;}
  .gallery .tile .overlay{
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,6,4,0.7) 0%, transparent 50%);
    opacity: 0; transition: opacity .4s ease;
    display: flex; align-items: flex-end; padding: 16px;
    font-family:"JetBrains Mono", monospace; font-size:10px;
    letter-spacing:0.2em; text-transform:uppercase; color: var(--paper);
  }
  .gallery .tile:hover .overlay{opacity: 1;}
  @media(max-width:820px){.gallery{grid-template-columns: repeat(2,1fr);} .gallery .tile:nth-child(1){grid-column: span 2; grid-row: auto;}}

  /* Image Strip - horizontal scroll */
  .image-strip{
    overflow: hidden;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 0;
    position: relative;
  }
  .image-strip-track{
    display: flex;
    gap: 0;
    animation: imageStripScroll 35s linear infinite;
    width: max-content;
  }
  .image-strip-track:hover{animation-play-state: paused;}
  .image-strip .strip-img{
    height: 280px;
    width: auto;
    flex-shrink: 0;
    object-fit: cover;
    filter: grayscale(30%) contrast(1.1);
    transition: filter .4s ease;
  }
  .image-strip .strip-img:hover{filter: grayscale(0%) contrast(1);}
  @keyframes imageStripScroll{
    0%{transform: translateX(0);}
    100%{transform: translateX(-50%);}
  }
  @media(max-width:820px){.image-strip .strip-img{height: 180px;}}

  /* Event thumbnails */
  .event-row .event-thumb{
    width: 72px; height: 72px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--rule);
    flex-shrink: 0;
    transition: border-color .3s;
  }
  .event-row:hover .event-thumb{border-color: var(--accent);}
  .event-row .event-thumb img{
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(40%);
    transition: filter .4s ease, transform .4s ease;
  }
  .event-row:hover .event-thumb img{filter: grayscale(0%); transform: scale(1.1);}

  .lightbox{
    position: fixed; inset:0; background: rgba(12,8,5,0.92);
    backdrop-filter: blur(20px);
    display:none; align-items:center; justify-content:center;
    z-index: 400; padding: 40px;
    animation: fadeIn .3s ease;
  }
  .lightbox.open{display:flex;}
  .lightbox .content{
    max-width: 900px; max-height: 80vh;
    border: 1px solid var(--accent);
    overflow: hidden;
  }
  .lightbox .content img{
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .lightbox-close{
    position: fixed; top:24px; right:24px;
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid var(--paper); background: transparent; color: var(--paper);
    font-size: 20px; cursor: pointer;
    transition: background .3s, color .3s;
  }
  .lightbox-close:hover{background: var(--paper); color: var(--bg);}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* === Hero CTA row + trust === */
  .hero-cta-row{display:flex; gap:16px; justify-content:center; margin-top: 36px; flex-wrap:wrap;}
  .hero-cta-row .arrow{display:inline-block; transition:transform .25s;}
  .hero-cta-row .btn:hover .arrow{transform: translateX(4px);}
  .hero-trust{
    margin-top: 36px; color: var(--ink-dim);
    font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
    display:inline-flex; gap:16px; flex-wrap:wrap; justify-content:center;
  }
  .hero-trust b{color: var(--accent-2); font-weight:400;}

  /* Hero Julia portrait circle */
  .hero-julia{
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .hero-julia img{
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 20%;
    border: 2px solid rgba(239,228,210,0.25);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: transform .4s ease, border-color .4s ease;
  }
  .hero-julia:hover img{
    transform: scale(1.05);
    border-color: var(--accent-2);
  }
  .hero-julia-name{
    font-family: "Newsreader", serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* Breathing indicator — subtle bottom-right */
  .breath{
    position: absolute; bottom: 140px; right: 48px; z-index: 3;
    display:flex; flex-direction:column; align-items:center; gap: 10px;
    pointer-events:none;
  }
  .breath .ring{
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid var(--accent-2);
    animation: breathe 11s ease-in-out infinite;
    position: relative;
  }
  .breath .ring::before{
    content:""; position:absolute; inset:0; border-radius:50%;
    background: radial-gradient(circle, rgba(224,160,84,0.2) 0%, transparent 70%);
    animation: breathe 11s ease-in-out infinite;
  }
  .breath .label{
    font-family:"JetBrains Mono", monospace; font-size:9px;
    letter-spacing:0.3em; text-transform:uppercase; color: var(--ink-dim);
  }
  @keyframes breathe{
    0%,100%{transform: scale(0.65); opacity: 0.4;}
    40%{transform: scale(1.1); opacity: 1;}
    55%{transform: scale(1.1); opacity: 1;}
  }
  [data-quiet="true"] .breath{opacity: 0.3;}
  @media (max-width:820px){.breath{display:none;}}

  /* Gong click hint */
  .gong-hint{
    position:absolute; top: 48%; left: 50%;
    transform: translate(-50%, 0);
    font-family:"JetBrains Mono", monospace; font-size:10px;
    letter-spacing:0.3em; text-transform:uppercase; color: var(--ink-dim);
    pointer-events:none;
    opacity: 0; animation: hintFade 3s ease 4.5s forwards;
    text-align:center;
  }
  .gong-hint .dot{display:inline-block; width:6px; height:6px; background: var(--accent-2); border-radius:50%; margin: 0 8px; vertical-align:middle; animation: hintPulse 2s ease infinite;}
  @keyframes hintFade{0%{opacity:0}50%{opacity:0.8}100%{opacity:0.6}}
  @keyframes hintPulse{0%,100%{transform:scale(1); opacity:1}50%{transform:scale(1.5); opacity:0.5}}

  /* === Sticky event bar === */
  .sticky-event{
    position: fixed; bottom: 0; left:0; right:0; z-index: 70;
    display:flex; align-items:center; gap: 24px; padding: 12px 36px;
    background: rgba(58, 38, 28, 0.94);
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border-top: 1px solid rgba(239,228,210,0.18);
    transform: translateY(100%);
    transition: transform .6s cubic-bezier(.22,.68,.22,1);
    font-size: 13px; color: var(--paper);
  }

  .sticky-portrait{

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
// Gong Canvas: concentric ripples, organic strike animation, mouse-reactive.
// Exports GongCanvas + SoundViz to window.

const { useEffect, useRef, useState } = React;

function hexToRgb(h){
  const c = getComputedStyle(document.documentElement).getPropertyValue(h).trim();
  const m = c.replace('#','');
  return [parseInt(m.substring(0,2),16), parseInt(m.substring(2,4),16), parseInt(m.substring(4,6),16)];
}

function GongCanvas(){
  const ref = useRef(null);
  const stateRef = useRef({ ripples: [], mouse: {x:0.5, y:0.5}, scroll:0, last: 0, auto: 0 });

  useEffect(()=>{
    const cvs = ref.current;
    const ctx = cvs.getContext('2d');
    let raf;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    function resize(){
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      cvs.width = cvs.offsetWidth * dpr;
      cvs.height = cvs.offsetHeight * dpr;
    }
    resize();
    window.addEventListener('resize', resize);

    function onMove(e){
      const r = cvs.getBoundingClientRect();
      stateRef.current.mouse = {
        x: (e.clientX - r.left) / r.width,
        y: (e.clientY - r.top) / r.height,
      };
    }
    function onClick(e){
      const r = cvs.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      stateRef.current.ripples.push({ x, y, t: 0, strength: 1.4 });
    }
    function onScroll(){
      stateRef.current.scroll = window.scrollY;
    }
    window.addEventListener('mousemove', onMove);
    cvs.addEventListener('click', onClick);
    window.addEventListener('scroll', onScroll, { passive:true });

    stateRef.current.ripples.push({ x: 0.5, y: 0.5, t: 0, strength: 1 });

    function draw(t){
      const s = stateRef.current;
      const dt = Math.min(0.05, (t - s.last)/1000 || 0.016);
      s.last = t;
      s.auto += dt;
      if (s.auto > 14){
        s.auto = 0;
        s.ripples.push({ x: 0.5, y: 0.5, t: 0, strength: 1.4 });
      }

      const w = cvs.width, h = cvs.height;
      const cx = w*0.5, cy = h*0.5;

      const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,w,h);

      const gradBg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w,h)*0.7);
      gradBg.addColorStop(0, 'rgba(194,97,58,0.08)');
      gradBg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradBg;
      ctx.fillRect(0,0,w,h);

      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#efe4d2';
      for (let i=0;i<40;i++){
        const rx = (Math.sin(i*12.9898 + t*0.0001)*0.5+0.5)*w;
        const ry = (Math.cos(i*78.233 + t*0.0001)*0.5+0.5)*h;
        ctx.beginPath(); ctx.arc(rx, ry, 1.2*dpr, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      const scrollK = Math.min(1, s.scroll / 900);
      const gongScale = 1 - scrollK * 0.25;
      const parallaxY = -scrollK * 80 * dpr;

      const mx = (s.mouse.x - 0.5) * 20 * dpr;
      const my = (s.mouse.y - 0.5) * 20 * dpr;

      const baseR = Math.min(w, h) * 0.24 * gongScale;

      ctx.save();
      ctx.translate(cx + mx*0.3, cy + my*0.3 + parallaxY);

      const discGrad = ctx.createRadialGradient(-baseR*0.3, -baseR*0.3, baseR*0.1, 0, 0, baseR);
      discGrad.addColorStop(0, 'rgba(224,160,84,0.25)');
      discGrad.addColorStop(0.35, 'rgba(139, 65, 30, 0.35)');
      discGrad.addColorStop(1, 'rgba(12, 8, 6, 0.85)');
      ctx.fillStyle = discGrad;
      ctx.beginPath(); ctx.arc(0,0,baseR,0,Math.PI*2); ctx.fill();

      ctx.strokeStyle = 'rgba(239,228,210,0.10)';
      ctx.lineWidth = 1*dpr;
      for (let i=1;i<8;i++){
        ctx.beginPath(); ctx.arc(0,0, baseR*(i/8), 0, Math.PI*2); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(194,97,58,0.6)';
      ctx.beginPath(); ctx.arc(0,0, baseR*0.12, 0, Math.PI*2); ctx.fill();

      ctx.restore();

      for (let i = s.ripples.length-1; i>=0; i--){
        const r = s.ripples[i];
        r.t += dt;
        const progress = r.t / 14;
        if (progress > 1){ s.ripples.splice(i,1); continue; }
        const ease = 1 - Math.pow(1-progress, 3);
        const radius = baseR + ease * Math.max(w,h) * 0.8;
        const alpha = (1 - progress) * 0.5 * r.strength;
        const ox = (r.x - 0.5) * w + mx*0.3;
        const oy = (r.y - 0.5) * h + my*0.3 + parallaxY;

        for (let k=0; k<5; k++){
          const rad = radius - k * 18 * dpr;
          if (rad < baseR) continue;
          ctx.strokeStyle = `rgba(224,160,84,${alpha * (1 - k*0.18)})`;
          ctx.lineWidth = (1.2 - k*0.15) * dpr;
          ctx.beginPath();
          ctx.arc(cx + ox, cy + oy, rad, 0, Math.PI*2);
          ctx.stroke();
        }
      }

      {
        const mxp = s.mouse.x * w, myp = s.mouse.y * h;
        const dist = Math.hypot(mxp - cx, myp - cy);
        if (dist > baseR * 0.8){
          ctx.strokeStyle = 'rgba(239,228,210,0.07)';
          ctx.lineWidth = 1*dpr;
          ctx.beginPath(); ctx.arc(mxp, myp, 80*dpr, 0, Math.PI*2); ctx.stroke();
          ctx.beginPath(); ctx.arc(mxp, myp, 140*dpr, 0, Math.PI*2); ctx.stroke();
        }
      }

      raf = requestAnimationFrame(draw);
    }
    raf = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
      window.removeEventListener('mousemove', onMove);
      cvs.removeEventListener('click', onClick);
      window.removeEventListener('scroll', onScroll);
    };
  }, []);

  return <canvas id="gong-canvas" ref={ref} aria-hidden="true" />;
}

function SoundViz({ playing }){
  const ref = useRef(null);
  useEffect(()=>{
    const cvs = ref.current;
    const ctx = cvs.getContext('2d');
    let raf, dpr = Math.min(window.devicePixelRatio||1, 2);
    function resize(){
      dpr = Math.min(window.devicePixelRatio||1, 2);
      cvs.width = cvs.offsetWidth * dpr;
      cvs.height = cvs.offsetHeight * dpr;
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;
    function draw(){
      t += playing ? 0.015 : 0.003;
      const w = cvs.width, h = cvs.height;
      const cx = w/2, cy = h/2;
      ctx.clearRect(0,0,w,h);

      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      const accent2 = getComputedStyle(document.documentElement).getPropertyValue('--accent-2').trim();

      ctx.strokeStyle = 'rgba(239,228,210,0.08)';
      ctx.lineWidth = 1*dpr;
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();

      const layers = 5;
      for (let l=0; l<layers; l++){
        ctx.beginPath();
        const amp = (playing ? 40 : 12) * dpr * (1 - l*0.15);
        const freq = 0.006 + l * 0.003;
        const phase = t * (1 + l*0.3);
        for (let x=0; x<=w; x += 2*dpr){
          const y = cy
            + Math.sin(x * freq + phase) * amp
            + Math.sin(x * freq * 2.3 + phase*1.7) * amp * 0.3;
          if (x === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        const alpha = 0.5 - l*0.08;
        ctx.strokeStyle = l % 2 === 0
          ? `rgba(${hex(accent)}, ${alpha})`
          : `rgba(${hex(accent2)}, ${alpha})`;
        ctx.lineWidth = (1.5 - l*0.2) * dpr;
        ctx.stroke();
      }

      raf = requestAnimationFrame(draw);
    }
    function hex(c){
      const m = c.replace('#','');
      return `${parseInt(m.substring(0,2),16)},${parseInt(m.substring(2,4),16)},${parseInt(m.substring(4,6),16)}`;
    }
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, [playing]);

  return <canvas ref={ref} className="viz" />;
}

window.GongCanvas = GongCanvas;
window.SoundViz = SoundViz;

// =============== STICKY EVENT BAR ===============
function StickyEventBar({ event }){
  const [show, setShow] = useState(false);
  useEffect(() => {
    function onScroll(){
      const y = window.scrollY;
      const h = window.innerHeight;
      const events = document.getElementById('events');
      const eventsTop = events ? events.getBoundingClientRect().top + window.scrollY : 9999;
      const final = document.getElementById('final');
      const finalTop = final ? final.getBoundingClientRect().top + window.scrollY : 99999;
      setShow(y > h*0.6 && y < eventsTop - h*0.3 || (y > eventsTop + 400 && y < finalTop - h));
    }
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

// =============== WORD REVEAL ===============
function WordReveal({ lines, delay=400, wordStagger=90, lineGap=220, className, italicLine }){
  return (
    <span className={className}>
      {lines.map((ln, li) => {
        const words = ln.split(' ');
        return (
          <span key={li} style={{display:'block'}}>
            {words.map((w, wi) => {
              const d = delay + li*lineGap + wi*wordStagger;
              return (
                <span key={wi} style={{
                  display:'inline-block',
                  overflow:'hidden',
                  verticalAlign:'top',
                  marginRight: '0.28em',
                }}>
                  <span style={{
                    display:'inline-block',
                    opacity: 0,
                    transform: 'translateY(110%)',
                    animation: `wordUp 1.1s cubic-bezier(.2,.7,.2,1) ${d}ms forwards`,
                    fontStyle: italicLine===li ? 'italic' : 'normal',
                    color: italicLine===li ? 'var(--accent-2)' : 'inherit',
                  }}>{w}</span>
                </span>
              );
            })}
          </span>
        );
      })}
    </span>
  );
}

// =============== COUNT UP HOOK ===============
function useCountUp(target, trigger, duration=1800){
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!trigger) return;
    let raf, start;
    const from = 0;
    function step(t){
      if (!start) start = t;
      const p = Math.min(1, (t - start)/duration);
      const eased = 1 - Math.pow(1-p, 3);
      setVal(from + (target - from) * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, trigger, duration]);
  return val;
}

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:300, background:'var(--bg)',
      overflowY:'auto',
      animation: 'fadeIn .5s ease',
    }}>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:80}}>

              {event.title}
            </h1>

              Ein Abend, an dem du nichts tun musst als da sein.
              Atmen. Zulassen. Schwingen.

            <div className="mono" style={{fontSize:10, letterSpacing:'.24em', color:'var(--ink-dim)', textTransform:'uppercase', marginBottom:8}}>Ort</div>
            <div style={{color:'var(--paper)', marginBottom:24}}>{event.loc}</div>

// =============== MAIN APP ===============
const NEXT_EVENT = { d:'17', m:'APR', yr:'2026', loc:'Yoga Studio Olpe', spots:'noch 8 Plätze frei' };

function App(){
  const [tweaks, setTweaks] = useState(() => ({ ...window.TWEAK_DEFAULTS }));
  const [editOpen, setEditOpen] = useState(false);
  const [activeEvent, setActiveEvent] = useState(null);
  const [lightboxImage, setLightboxImage] = useState(null);

  useEffect(() => {
    const h = document.documentElement;
    h.setAttribute('data-palette', tweaks.palette);
  }, [tweaks]);

  useEffect(() => {
    function onMsg(e){
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditOpen(true);
      if (d.type === '__deactivate_edit_mode') setEditOpen(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function update(patch){
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: patch }, '*');
  }

  useEffect(() => {
    function autoApply(){
      const sections = document.querySelectorAll('section[id]:not(#hero)');
      sections.forEach(sec => {
        const host = sec.querySelector('.container, .resilience-grid, .timeline, .faq-list, .testimonial-grid, .final-inner') || sec;
        const kids = Array.from(host.children);
        kids.forEach((el, i) => {
          if (!el.classList) return;
          if (el.classList.contains('reveal')) return;
          const tag = el.tagName.toLowerCase();
          if (tag === 'style' || tag === 'script') return;
          if (el.classList.contains('no-reveal')) return;
          el.classList.add('reveal');
          if (!el.hasAttribute('data-delay')){
            const d = Math.min(i, 4);
            if (d > 0) el.setAttribute('data-delay', String(d));
          }
        });
      });
    }
    autoApply();

    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -8% 0px' });
    const mo = new MutationObserver(() => {
      autoApply();
      document.querySelectorAll('.reveal:not(.in), .reveal-x:not(.in)').forEach(el => io.observe(el));
    });
    mo.observe(document.body, { childList:true, subtree:true });
    document.querySelectorAll('.reveal, .reveal-x').forEach(el => io.observe(el));
    return () => { io.disconnect(); mo.disconnect(); };
  }, []);

  useEffect(() => {
    const prog = document.getElementById('scroll-progress');
    function onScroll(){
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      if (prog) prog.style.width = Math.min(100, Math.max(0, pct)) + '%';
    }
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();

    const canHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    const ring = document.getElementById('cursor-ring');
    const dot = document.getElementById('cursor-dot');
    if (canHover && ring && dot){
      document.body.classList.add('has-cursor');
      let tx=0, ty=0, rx=0, ry=0;
      function move(e){ tx = e.clientX; ty = e.clientY; dot.style.transform = `translate(${tx}px,${ty}px) translate(-50%,-50%)`; }
      function loop(){
        rx += (tx - rx) * 0.18;
        ry += (ty - ry) * 0.18;
        ring.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
        requestAnimationFrame(loop);
      }
      window.addEventListener('mousemove', move);
      loop();
      function enter(e){
        const el = e.target.closest('[data-cursor="big"], a, button');
        if (el) ring.classList.add('big');
      }
      function leave(e){
        const el = e.target.closest('[data-cursor="big"], a, button');
        if (el) ring.classList.remove('big');
      }
      document.addEventListener('mouseover', enter);
      document.addEventListener('mouseout', leave);
    }

    const magnets = document.querySelectorAll('.magnet');
    magnets.forEach(m => {
      m.addEventListener('mousemove', (e) => {
        const r = m.getBoundingClientRect();
        const x = e.clientX - r.left - r.width/2;
        const y = e.clientY - r.top - r.height/2;
        m.style.transform = `translate(${x*0.25}px, ${y*0.35}px)`;
      });
      m.addEventListener('mouseleave', () => m.style.transform = '');
    });

    function ripple(e){
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const r = btn.getBoundingClientRect();
      const d = document.createElement('span');
      d.className = 'ripple';
      const size = Math.max(r.width, r.height);
      d.style.width = d.style.height = size + 'px';
      d.style.left = (e.clientX - r.left - size/2) + 'px';
      d.style.top = (e.clientY - r.top - size/2) + 'px';
      btn.appendChild(d);
      setTimeout(() => d.remove(), 700);
    }
    document.addEventListener('click', ripple);

    const lb = document.getElementById('lightbox');
    const close = document.getElementById('lightbox-close');
    function cls(){ lb?.classList.remove('open'); }
    close?.addEventListener('click', cls);
    lb?.addEventListener('click', e => { if (e.target === lb) cls(); });

    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  function openLightbox(src){
    setLightboxImage(src);
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox(){
    setLightboxImage(null);
    document.getElementById('lightbox').classList.remove('open');
  }

  return (
    <>
      <Nav />
      <Hero nextEvent={NEXT_EVENT} />
      <Intro />
      <Pillars />
      <Resilience />
      <Timeline />
      <Offerings />
      <Events onOpen={setActiveEvent} />
      <Player />
      <Testimonials />
      <Gallery onOpenLightbox={openLightbox} />
      <About />
      <FAQ />
      <FinalCTA nextEvent={NEXT_EVENT} />
      <Contact />
      <Footer />

      <EventDetail event={activeEvent} onClose={() => setActiveEvent(null)} />
      <StickyEventBar event={NEXT_EVENT} />

      {/* Lightbox */}
      <div className="lightbox" id="lightbox" onClick={(e) => e.target.id === 'lightbox' && closeLightbox()}>
        <button className="lightbox-close" onClick={closeLightbox}>×</button>
        <div className="content">
          {lightboxImage && <img src={lightboxImage} alt="Galerie Bild" />}
        </div>
      </div>

      <div className="tweaks-panel" data-open={editOpen}>
        <h5>Tweaks</h5>
        <div className="row">
          <label>Farbwelt</label>
          <div className="swatches">
            {[
              ['terracotta', '#c2613a', 'Terra'],
              ['ocker', '#d29244', 'Ocker'],
              ['espresso', '#8a3a1f', 'Esp.'],
            ].map(([key, col, label]) => (
              <div key={key}
                   data-active={tweaks.palette === key}
                   className="swatch"
                   style={{background:`linear-gradient(180deg, ${col} 0%, #1a120d 100%)`}}
                   onClick={() => update({ palette: key })}>
                {label}
              </div>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
